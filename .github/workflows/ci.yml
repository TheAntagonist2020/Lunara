name: CI – Lint & Validate

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none

      - name: Run PHP syntax check (theme)
        run: find wp-content/themes/lunara -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run PHP syntax check (plugin)
        run: find wp-content/plugins/academy-awards-table -name '*.php' -print0 | xargs -0 -n1 php -l
